<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Framazon - Tu tienda online{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --amazon-orange: #febd69; --amazon-dark: #131921; }
        body { background-color: #f3f3f3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--amazon-dark); }
        .navbar-brand { color: white !important; font-weight: bold; font-size: 1.5rem; }
        .navbar-brand span { color: var(--amazon-orange); }
        .btn-warning { background-color: var(--amazon-orange); border: none; color: #111; }
        .btn-warning:hover { background-color: #f3a847; }
        footer { background-color: var(--amazon-dark); color: white; padding: 2rem 0; margin-top: 3rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'shop:product_list' %}">
                F<span>r</span>amazon
            </a>
            
            <div class="d-flex align-items-center">
                <a href="{% url 'shop:cart_detail' %}" class="btn btn-outline-light position-relative ms-3">
                    <i class="bi bi-cart3"></i> Carrito
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        {{ cart|length }}
                    </span>
                </a>
                {% if user.is_authenticated %}
                    <span class="text-white ms-3 small">Hola, {{ user.username }}</span>
                    <a href="{% url 'admin:index' %}" class="btn btn-sm btn-link text-white text-decoration-none ms-2">Panel</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <div class="container text-center">
            <p>© 2026 F<span>r</span>amazon.com - Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
