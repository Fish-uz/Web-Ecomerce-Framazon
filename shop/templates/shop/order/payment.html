{% extends "shop/layout/base.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4"><i class="bi bi-credit-card me-2"></i>Pago con Tarjeta</h4>
                    <form action="." method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="small text-muted">Número de Tarjeta</label>
                            <input type="text" class="form-control" placeholder="0000 0000 0000 0000">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="small text-muted">Expiración</label>
                                <input type="text" class="form-control" placeholder="MM/YY">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="small text-muted">CVV</label>
                                <input type="text" class="form-control" placeholder="123">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold">Pagar ${{ order.get_total_cost }}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
