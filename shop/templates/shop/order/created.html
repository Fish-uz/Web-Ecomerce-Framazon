{% extends "shop/layout/base.html" %}
{% block title %}Pedido Confirmado - Framazon{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="card shadow-sm border-0 p-5 mx-auto" style="max-width: 600px;">
        <div class="mb-4">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
        </div>
        <h1 class="fw-bold">¡Gracias por comprar en Framazon!</h1>
        <p class="fs-5 mt-3 text-muted">Tu pedido es el <strong>#{{ order.id }}</strong></p>
        <p>Enviaremos los detalles a <strong>{{ order.email }}</strong>.</p>
        <div class="mt-4">
            <a href="{% url 'shop:product_list' %}" class="btn btn-warning btn-lg rounded-pill fw-bold px-5">
                Volver a la tienda
            </a>
        </div>
    </div>
</div>
{% endblock %}
