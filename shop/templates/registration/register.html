{% extends "shop/layout/base.html" %}

{% block title %}Crear cuenta - Framazon{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center fw-bold mb-4">Crea tu cuenta</h2>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-warning w-100 fw-bold rounded-pill mt-3">
                            Registrarse
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <small>¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-decoration-none">Inicia sesión</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
